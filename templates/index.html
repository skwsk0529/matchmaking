<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read Life | 相性診断</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>✦ Read Life ✦</h1>
      <p class="subtitle">二人が歩む人生を読みます。</p>
    </header>

    {% if errors %}
    <div class="error-box">
      <ul>
        {% for e in errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
    </div>
    {% endif %}

    <form action="/result" method="post">
      <div class="persons-row">

        <!-- 求婚者 A -->
        <div class="person-card card-a">
          <h2>あなたの情報をご入力ください</h2>
          <div class="field">
            <label>お名前</label>
            <input type="text" name="name_a" placeholder="山田 太郎"
                   value="{{ name_a or '' }}">
          </div>
          <div class="field">
            <label>生年月日 <span class="hint">8桁の数字</span></label>
            <input type="text" name="date_a" placeholder="19940529"
                   maxlength="8" inputmode="numeric" pattern="\d{8}"
                   value="{{ date_a or '' }}" required>
          </div>
        </div>

        <!-- 求婚者 B -->
        <div class="person-card card-b">
          <h2>お相手の情報をご入力ください</h2>
          <div class="field">
            <label>お名前</label>
            <input type="text" name="name_b" placeholder="鈴木 花子"
                   value="{{ name_b or '' }}">
          </div>
          <div class="field">
            <label>生年月日 <span class="hint">8桁の数字</span></label>
            <input type="text" name="date_b" placeholder="19961015"
                   maxlength="8" inputmode="numeric" pattern="\d{8}"
                   value="{{ date_b or '' }}" required>
          </div>
        </div>

      </div>

      <div class="submit-wrap">
        <button type="submit" class="btn-submit">相性を診断する ✦</button>
      </div>
    </form>

    <p class="disclaimer">
      ※ 本診断は占星術に基づくエンターテインメントです。実際の相性はお二人のご縁と努力によって決まります。
    </p>
  </div>
</body>
</html>
